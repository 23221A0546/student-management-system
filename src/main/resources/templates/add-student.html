<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Add Student</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

    <style>

        body{
            font-family:'Poppins',sans-serif;
            background:#f4f7fc;
        }

        .card{
            border:none;
            border-radius:15px;
        }

        .page-title{
            color:#0d6efd;
            font-weight:700;
        }

    </style>

</head><body><div class="container mt-5"><div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-lg p-4" data-aos="zoom-in">

            <h2 class="text-center page-title mb-4">
                <i class="bi bi-person-plus-fill"></i>
                Add Student
            </h2>

            <form action="/save-student"
                  method="post"
                  enctype="multipart/form-data">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Student Name</label>
                        <input type="text"
                               class="form-control"
                               name="name"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email"
                               class="form-control"
                               name="email"
                               required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Mobile</label>
                        <input type="text"
                               class="form-control"
                               name="mobile">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Course</label>
                        <input type="text"
                               class="form-control"
                               name="course">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Branch</label>
                        <input type="text"
                               class="form-control"
                               name="branch">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Attendance (%)</label>
                        <input type="number"
                               step="0.1"
                               class="form-control"
                               name="attendance">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Progress (%)</label>
                        <input type="number"
                               step="0.1"
                               class="form-control"
                               name="progress">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">CGPA</label>
                        <input type="number"
                               step="0.01"
                               class="form-control"
                               name="cgpa">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Backlogs</label>
                        <input type="number"
                               class="form-control"
                               name="backlogs">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Total Fees</label>
                        <input type="number"
                               step="0.01"
                               class="form-control"
                               name="totalFees">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fees Paid</label>
                        <input type="number"
                               step="0.01"
                               class="form-control"
                               name="feesPaid">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Student Photo</label>
                        <input type="file"
                               class="form-control"
                               name="photoFile">
                    </div>

                </div>

                <div class="d-flex gap-2 mt-3">

                    <button type="submit"
                            class="btn btn-success">
                        <i class="bi bi-check-circle-fill"></i>
                        Save Student
                    </button>

                    <a href="/admin-dashboard"
                       class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i>
                        Back
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script><script>
    AOS.init({
        duration:1000,
        once:true
    });
</script></body></html>
