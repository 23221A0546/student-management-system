<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Edit Student</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css"
          rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f7fc;
        }

        .edit-card{
            border:none;
            border-radius:20px;
        }

        .student-photo{
            width:140px;
            height:140px;
            border-radius:50%;
            object-fit:cover;
            border:4px solid #0d6efd;
        }

    </style>

</head><body><div class="container py-5"><div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow-lg edit-card p-4"
             data-aos="zoom-in">

            <h2 class="text-center text-primary mb-4">
                <i class="bi bi-pencil-square"></i>
                Edit Student
            </h2>

            <div class="text-center mb-4">

                <img th:src="${student.photo}">

            </div>

            <form th:action="@{/update-student/{id}(id=${student.id})}"
                  th:object="${student}"
                  method="post"
                  enctype="multipart/form-data">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Name</label>
                        <input type="text"
                               class="form-control"
                               name="name"
                               th:value="${student.name}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email"
                               class="form-control"
                               name="email"
                               th:value="${student.email}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Mobile</label>
                        <input type="text"
                               class="form-control"
                               name="mobile"
                               th:value="${student.mobile}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Course</label>
                        <input type="text"
                               class="form-control"
                               name="course"
                               th:value="${student.course}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Branch</label>
                        <input type="text"
                               class="form-control"
                               name="branch"
                               th:value="${student.branch}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Attendance (%)</label>
                        <input type="number"
                               step="0.1"
                               class="form-control"
                               name="attendance"
                               th:value="${student.attendance}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Progress (%)</label>
                        <input type="number"
                               step="0.1"
                               class="form-control"
                               name="progress"
                               th:value="${student.progress}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Upload New Photo</label>
                        <input type="file"
                               class="form-control"
                               name="photoFile">
                    </div>

                </div>


                <div class="col-md-6 mb-3">
                    <label class="form-label">CGPA</label>
                    <input type="number"
                           step="0.01"
                           class="form-control"
                           name="form-control"
                           th:field="${student.cgpa}">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Backlogs</label>
                    <input type="number"
                           class="form-control"
                           name="backlogs"
                           th:value="${student.backlogs}">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Total Fees</label>
                    <input type="number"
                           step="0.01"
                           class="form-control"
                           name="totalFees"
                           th:value="${student.totalFees}">
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Fees Paid</label>
                    <input type="number"
                           step="0.01"
                           class="form-control"
                           name="feesPaid"
                           th:field="${student.feesPaid}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Pending Fees</label>
                    <input type="text"
                           class="form-control"
                           th:value="${student.pendingFees}"
                           readonly>
                </div>
                <div class="d-flex gap-2 mt-3">

                    <button type="submit"
                            class="btn btn-success">

                        <i class="bi bi-check-circle-fill"></i>
                        Update Student

                    </button>

                    <a href="/admin-dashboard"
                       class="btn btn-secondary">

                        <i class="bi bi-arrow-left"></i>
                        Back

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script><script>
    AOS.init({
        duration:1000,
        once:true
    });
</script></body></html>
