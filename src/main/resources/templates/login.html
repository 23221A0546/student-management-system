<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Student Progress Portal</title>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css"
          rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0d6efd,#6610f2);
        }

        .login-card{
            width:100%;
            max-width:450px;
            border:none;
            border-radius:20px;
            overflow:hidden;
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:25px;
        }

        .portal-icon{
            font-size:55px;
        }

        .btn-login{
            background:#0d6efd;
            color:white;
            font-weight:600;
            padding:12px;
        }

        .btn-login:hover{
            background:#0b5ed7;
            color:white;
        }

        .form-control{
            padding:12px;
        }

    </style>

</head><body><div class="card shadow-lg login-card"
                  data-aos="zoom-in"><div class="card-header">

    <i class="bi bi-mortarboard-fill portal-icon"></i>

    <h2 class="mt-2">
        Student Progress Portal
    </h2>

    <p class="mb-0">
        Login to continue
    </p>

</div>

    <div class="card-body p-4">

        <form action="/login"
              method="post">

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input type="email"
                       class="form-control"
                       name="username"
                       placeholder="Enter Email"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       class="form-control"
                       name="password"
                       placeholder="Enter Password"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-login w-100">

                <i class="bi bi-box-arrow-in-right"></i>
                Login

            </button>

        </form>

        <hr>

        <div class="text-center">

            Don't have an account?
            <a href="/register" class="btn btn-primary">
                Student Register
            </a>



        </div>

    </div>

</div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script><script>
    AOS.init({
        duration:1000,
        once:true
    });
</script></body></html>
