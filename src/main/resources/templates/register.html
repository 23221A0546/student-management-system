<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>User Registration</title>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css"
          rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0d6efd,#6610f2);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .register-card{
            width:100%;
            max-width:500px;
            border:none;
            border-radius:20px;
            overflow:hidden;
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:20px;
        }

        .btn-register{
            background:#0d6efd;
            color:white;
            font-weight:600;
        }

        .btn-register:hover{
            background:#0b5ed7;
            color:white;
        }

    </style>

</head><body><div class="card shadow-lg register-card"
                  data-aos="zoom-in"><div class="card-header">

    <h2>
        <i class="bi bi-person-plus-fill"></i>
        User Registration
    </h2>

</div>

    <div class="card-body p-4">

        <form action="/register"
              method="post"
              enctype="multipart/form-data">

            <div class="mb-3">

                <label class="form-label">
                    Full Name
                </label>

                <input type="text"
                       class="form-control"
                       name="name"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input type="email"
                       class="form-control"
                       name="email"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       class="form-control"
                       name="password"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Profile Photo
                </label>

                <input type="file"
                       class="form-control"
                       name="photoFile"
                       required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Role
                </label>

                <select name="role"
                        class="form-select"
                        required>

                    <option value="">
                        Select Role
                    </option>

                    <option value="ADMIN">
                        Admin
                    </option>

                    <option value="STUDENT">
                        Student
                    </option>

                </select>

            </div>
            <div class="mb-3">
                <label>CGPA</label>
                <input type="number" step="0.01" name="cgpa" class="form-control">
            </div>

            <div class="mb-3">
                <label>Backlogs</label>
                <input type="number" name="backlogs" class="form-control">
            </div>

            <div class="mb-3">
                <label>Total Fees</label>
                <input type="number"  name="totalFees" class="form-control">
            </div>

            <div class="mb-3">
                <label>Fees Paid</label>
                <input type="number" name="feesPaid" class="form-control">
            </div>

            <button type="submit"
                    class="btn btn-register w-100">

                <i class="bi bi-check-circle-fill"></i>
                Register

            </button>

        </form>

        <hr>

        <div class="text-center">

            Already have an account?

            <a href="/"
               class="text-decoration-none fw-bold">
                Login
            </a>

        </div>

    </div>

</div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script><script>
    AOS.init({
        duration:1000,
        once:true
    });
</script></body></html>
