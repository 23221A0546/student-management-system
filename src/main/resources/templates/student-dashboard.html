<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head><title>Student Dashboard</title>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- AOS Animation -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css"
          rel="stylesheet">

    <style>

        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f7fc;
        }

        .navbar{
            background:#0d6efd;
            padding:15px 30px;
        }

        .profile-card{
            border:none;
            border-radius:20px;
            overflow:hidden;
        }

        .profile-image{
            width:180px;
            height:180px;
            border-radius:50%;
            object-fit:cover;
            border:5px solid #0d6efd;
        }

        .info-card{
            border:none;
            border-radius:15px;
        }

        .stat-box{
            text-align:center;
            padding:20px;
        }

        .stat-value{
            font-size:28px;
            font-weight:700;
            color:#0d6efd;
        }

    </style>

</head><body><nav class="navbar navbar-dark"><div class="container-fluid">

    <h3 class="text-white mb-0">
        <i class="bi bi-mortarboard-fill"></i>
        Student Dashboard
    </h3>

    <a href="/"
       class="btn btn-light">
        <i class="bi bi-box-arrow-right"></i>
        Logout
    </a>

</div>

</nav><div class="container py-5"><div class="row">

    <!-- Profile Section -->

    <div class="col-lg-4 mb-4">

        <div class="card shadow profile-card text-center p-4"
             data-aos="zoom-in">

            <img th:src="@{'/uploads/' + ${student.photo}}"
                 class="profile-image mx-auto">

            <h3 class="mt-3"
                th:text="${student.name}">
                Student Name
            </h3>

            <p class="text-muted"
               th:text="${student.email}">
                student@email.com
            </p>
            <p><strong>CGPA:</strong>
                <span th:text="${student.cgpa}"></span>
            </p>

            <p><strong>Backlogs:</strong>
                <span th:text="${student.backlogs}"></span>
            </p>

            <p><strong>Total Fees:</strong>
                <span th:text="${student.totalFees}"></span>
            </p>

            <p><strong>Fees Paid:</strong>
                <span th:text="${student.feesPaid}"></span>
            </p>

            <p><strong>Pending Fees:</strong>
                <span th:text="${student.pendingFees}"></span>
            </p>
        </div>

    </div>

    <!-- Details Section -->

    <div class="col-lg-8">

        <div class="card shadow info-card p-4"
             data-aos="fade-left">

            <h4 class="mb-4">
                Student Information
            </h4>

            <div class="row">

                <div class="col-md-6 mb-3">
                    <strong>Email</strong><br>
                    <span th:text="${student.email}"></span>
                </div>

                <div class="col-md-6 mb-3">
                    <strong>Mobile</strong><br>
                    <span th:text="${student.mobile}"></span>
                </div>

                <div class="col-md-6 mb-3">
                    <strong>Course</strong><br>
                    <span th:text="${student.course}"></span>
                </div>

                <div class="col-md-6 mb-3">
                    <strong>Branch</strong><br>
                    <span th:text="${student.branch}"></span>
                </div>

            </div>

        </div>

        <!-- Statistics -->

        <div class="row mt-4">

            <div class="col-md-6">

                <div class="card shadow stat-box"
                     data-aos="fade-up">

                    <h5>Attendance</h5>

                    <div class="stat-value">
                        <span th:text="${student.attendance}"></span>%
                    </div>

                    <div class="progress mt-3">

                        <div class="progress-bar bg-success"
                             role="progressbar"
                             th:style="'width:' + ${student.attendance} + '%'">
                        </div>

                    </div>

                </div>

            </div>

            <div class="col-md-6">

                <div class="card shadow stat-box"
                     data-aos="fade-up">

                    <h5>Progress</h5>

                    <div class="stat-value">
                        <span th:text="${student.progress}"></span>%
                    </div>

                    <div class="progress mt-3">

                        <div class="progress-bar bg-primary"
                             role="progressbar"
                             th:style="'width:' + ${student.progress} + '%'">
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script><script>
    AOS.init({
        duration:1000,
        once:true
    });
</script></body></html>
