<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Profile</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Student Profile</h3>
        </div>

        <div class="card-body">

            <div class="text-center mb-4">

                <img th:if="${student.photo != null}"
                     th:src="${student.photo}"
                     width="150"
                     height="150"
                     class="rounded-circle border">

            </div>

            <table class="table table-bordered">

                <tr>
                    <th>ID</th>
                    <td th:text="${student.id}"></td>
                </tr>

                <tr>
                    <th>Name</th>
                    <td th:text="${student.name}"></td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td th:text="${student.email}"></td>
                </tr>

                <tr>
                    <th>Mobile</th>
                    <td th:text="${student.mobile}"></td>
                </tr>

                <tr>
                    <th>Course</th>
                    <td th:text="${student.course}"></td>
                </tr>

                <tr>
                    <th>Branch</th>
                    <td th:text="${student.branch}"></td>
                </tr>

                <tr>
                    <th>Attendance</th>
                    <td th:text="${student.attendance} + '%'"></td>
                </tr>

                <tr>
                    <th>Progress</th>
                    <td th:text="${student.progress} + '%'"></td>
                </tr>

                <tr>
                    <th>CGPA</th>
                    <td th:text="${student.cgpa}"></td>
                </tr>

                <tr>
                    <th>Backlogs</th>
                    <td th:text="${student.backlogs}"></td>
                </tr>

                <tr>
                    <th>Total Fees</th>
                    <td th:text="${student.totalFees}"></td>
                </tr>

                <tr>
                    <th>Fees Paid</th>
                    <td th:text="${student.feesPaid}"></td>
                </tr>

                <tr>
                    <th>Pending Fees</th>
                    <td th:text="${student.pendingFees}"></td>
                </tr>

            </table>

            <a href="/admin-dashboard" class="btn btn-secondary">
                Back to Dashboard
            </a>

        </div>

    </div>

</div>

</body>
</html>
